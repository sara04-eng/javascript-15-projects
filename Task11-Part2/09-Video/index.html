<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="video-container">
     <video id="video" src="mixkit-stunning-sunset-seen-from-the-sea-4119-hd-ready.mp4" poster=""></video>
     
    </div>

    <div class="video-controls">
      <button id="play-btn" class="control-btn">&#9658; Play</button>
      <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
      <span id="time">00:00 / 00:00</span>
      <select id="speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
      <button id="mute-btn" class="control-btn">&#128266;</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>

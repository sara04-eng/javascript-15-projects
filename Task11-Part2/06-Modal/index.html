<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <button class="btn" id="open-modal">Show Modal</button>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-container">
      <button class="close-btn" id="close-modal">&times;</button>
      <h2>Modal Title</h2>
      <p>simple modal window that is built with vanilla JavaScript.<br> Click the button below, the X, or the overlay to close it.</p>
      <button class="btn" id="close-modal-2">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
